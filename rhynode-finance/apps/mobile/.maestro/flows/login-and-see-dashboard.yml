appId: com.rhynode.finance
---
- runFlow: launch-app.yml
- tapOn:
    id: "sign-in-email"
- inputText: "${E2E_EMAIL}"
- tapOn:
    id: "sign-in-password"
- inputText: "${E2E_PASSWORD}"
- tapOn:
    id: "sign-in-submit"
- extendedWaitUntil:
    visible:
      id: "dashboard-title"
    timeout: 30000
- assertVisible:
    id: "dashboard-title"
