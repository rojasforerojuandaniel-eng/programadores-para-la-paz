packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  '@clerk/shared': set this to true or false
  '@parcel/watcher': set this to true or false
  '@prisma/engines': set this to true or false
  '@sentry/cli': set this to true or false
  '@swc/core': set this to true or false
  browser-tabs-lock: set this to true or false
  bufferutil: set this to true or false
  core-js: set this to true or false
  esbuild: set this to true or false
  prisma: set this to true or false
  sharp: set this to true or false
  unrs-resolver: set this to true or false
  utf-8-validate: set this to true or false
onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@prisma/engines'
  - '@sentry/cli'
  - '@swc/core'
  - 'esbuild'
  - 'prisma'
  - 'sharp'
  - 'unrs-resolver'
verifyDepsBeforeRun: false
