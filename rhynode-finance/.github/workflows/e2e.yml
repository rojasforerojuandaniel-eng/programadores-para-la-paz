name: E2E (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Required repository secrets (Settings → Secrets and variables → Actions):
#   E2E_CLERK_EMAIL       — Clerk test user email (already verified, no 2FA code on sign-in)
#   CLERK_SECRET_KEY      — Clerk secret key (same the app uses, to mint a sign-in token)
#   E2E_CLERK_NAME        — (optional) friendly name used during onboarding
#   E2E_BUSINESS_NAME     — (optional) business name used during onboarding
# Without these, the authenticated specs are skipped (setup fails with a clear
# message); the unauthenticated specs (landing, auth, dashboard-redirect) still run.

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build
        env:
          # Clerk publishable key is needed at build time for the Clerk SDK.
          # Set it as a repository secret (or variable) if the build requires it.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          E2E_CLERK_EMAIL: ${{ secrets.E2E_CLERK_EMAIL }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_NAME: ${{ secrets.E2E_CLERK_NAME }}
          E2E_BUSINESS_NAME: ${{ secrets.E2E_BUSINESS_NAME }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14