name: Rhynode Finance iOS EAS Preview Build

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build"
        required: true
        default: "feat/web-redesign-2026-07-10"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: ./rhynode-finance/apps/mobile
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ./rhynode-finance/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build iOS preview
        run: eas build --platform ios --profile preview --non-interactive --no-wait
        env:
          EAS_PROJECT_ROOT: ./rhynode-finance/apps/mobile
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          EXPO_PUBLIC_API_URL: https://rhynode-finance.vercel.app
          EXPO_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
